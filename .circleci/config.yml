version: 2.1
orbs:
  docker: circleci/docker@2.8.0

# Deploy markers (circleci run release plan/update) make each deploy visible in
# the project Deploys UI with SUCCESS/FAILED status. See:
# https://app.circleci.com/settings/project/github/suculent/arduino-docker-build/deploys

jobs:

  deploy8266:
    executor: docker/docker
    steps:
      - setup_remote_docker
      - checkout
      - run:
          name: Plan a deploy
          command: |
            circleci run release plan \
              --environment-name="production" \
              --component-name="esp8266" \
              --target-version="$CIRCLE_SHA1"
      - docker/check
      - docker/build:
          image: suculent/arduino-docker-build
          dockerfile: ./Dockerfile.esp8266
          tag: esp8266
      - docker/push:
          digest-path: /tmp/digest.txt
          image: suculent/arduino-docker-build
          tag: esp8266
      - run:
          command: |
            echo "Digest is: $(</tmp/digest.txt)"
            docker tag $(</tmp/digest.txt) suculent/arduino-docker-build:esp8266
      - run:
          name: Mark deploy SUCCESS
          command: circleci run release update --status=SUCCESS
          when: on_success
      - run:
          name: Mark deploy FAILED
          command: circleci run release update --status=FAILED
          when: on_fail

  deploy32:
    executor: docker/docker
    steps:
      - setup_remote_docker
      - checkout
      - run:
          name: Plan a deploy
          command: |
            circleci run release plan \
              --environment-name="production" \
              --component-name="esp32" \
              --target-version="$CIRCLE_SHA1"
      - docker/check
      - docker/build:
          image: suculent/arduino-docker-build
          dockerfile: ./Dockerfile.esp32
          tag: esp32
      - docker/push:
          digest-path: /tmp/digest.txt
          image: suculent/arduino-docker-build
          tag: esp32
      - run:
          command: |
            echo "Digest is: $(</tmp/digest.txt)"
            docker tag $(</tmp/digest.txt) suculent/arduino-docker-build:esp32
      - run:
          name: Mark deploy SUCCESS
          command: circleci run release update --status=SUCCESS
          when: on_success
      - run:
          name: Mark deploy FAILED
          command: circleci run release update --status=FAILED
          when: on_fail

  deployFat:
    executor: docker/docker
    steps:
      - setup_remote_docker
      - checkout
      - run:
          name: Plan a deploy
          command: |
            circleci run release plan \
              --environment-name="production" \
              --component-name="fat" \
              --target-version="$CIRCLE_SHA1"
      - docker/check
      - docker/build:
          image: suculent/arduino-docker-build
          tag: latest
      - docker/push:
          digest-path: /tmp/digest.txt
          image: suculent/arduino-docker-build
          tag: latest
      - run:
          command: |
            echo "Digest is: $(</tmp/digest.txt)"
            docker tag $(</tmp/digest.txt) suculent/arduino-docker-build:latest
      - run:
          name: Mark deploy SUCCESS
          command: circleci run release update --status=SUCCESS
          when: on_success
      - run:
          name: Mark deploy FAILED
          command: circleci run release update --status=FAILED
          when: on_fail

  test:
    executor: docker/docker
    steps:
      - setup_remote_docker
      - checkout
      - docker/check
      - docker/build:
          image: suculent/arduino-docker-build
          tag: future

#
# WORKFLOWS
#

workflows:

  build:
    jobs:
      - test:
          context:
            - dockerhub
      - deployFat:
          context:
            - dockerhub
          requires:
              - test
          filters:
            branches:
              only: master, test
      - deploy32:
          context:
            - dockerhub
          requires:
              - test
          filters:
            branches:
              only: esp32
      - deploy8266:
          context:
            - dockerhub
          requires:
              - test
          filters:
            branches:
              only: esp8266
